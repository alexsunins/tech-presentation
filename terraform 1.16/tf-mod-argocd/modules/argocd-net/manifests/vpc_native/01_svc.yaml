apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: ${namespace_name}
  labels:
    fingerprint: ${manifest_fingerprint}
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: argocd-server