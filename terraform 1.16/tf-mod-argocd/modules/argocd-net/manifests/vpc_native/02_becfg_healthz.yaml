apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: argocd-backend-config-healthz
  namespace: ${namespace_name}
  labels:
    fingerprint: ${manifest_fingerprint}
spec:
  healthCheck:
    checkIntervalSec: 30
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    type: HTTP
    requestPath: /healthz
    port: 8080